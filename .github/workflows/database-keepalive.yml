name: Database Keepalive

on:
  schedule:
    - cron: '17 */12 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: database-keepalive
  cancel-in-progress: false

jobs:
  keepalive:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24.18.0
          cache: npm
      - run: npm ci --ignore-scripts --workspace=@librechat/api --include-workspace-root=false
      - run: node packages/api/scripts/keepalive.mts
        env:
          MONGO_DEV_URI: ${{ secrets.MONGO_DEV_URI }}
          MONGO_PROD_URI: ${{ secrets.MONGO_PROD_URI }}
          SUPABASE_DEV_URL: ${{ secrets.SUPABASE_DEV_URL }}
          SUPABASE_PROD_URL: ${{ secrets.SUPABASE_PROD_URL }}
