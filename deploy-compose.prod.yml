services:
  api:
    image: ${LIBRECHAT_IMAGE:-ghcr.io/spotifynetflixyu/librechat-prod-api:master}
    container_name: librechat-prod-api
    restart: unless-stopped
    env_file:
      - ${LIBRECHAT_ENV_FILE:-/etc/librechat/.env.prod}
    environment:
      HOST: 0.0.0.0
      PORT: ${PORT:-3080}
      DATA_DIR: /data
      CONFIG_PATH: /data/librechat.yaml
      OPENAI_OAUTH_AUTH_FILE: /data/openai-oauth/auth.json
    volumes:
      - /data:/data
      - ./deploy/host:/app/deploy/host:ro
    command: sh /app/deploy/host/start.sh
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:${PORT:-3080}/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 300s

  caddy:
    image: caddy:2.10-alpine
    container_name: librechat-prod-caddy
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
    environment:
      LIBRECHAT_DOMAIN: ${LIBRECHAT_DOMAIN:-chat.longdin.org}
      PORT: ${PORT:-3080}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/digitalocean/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
